model: "google/gemini-3.1-pro-preview"
max-steps: 30
debug: false
quiet: true

# Make outputs safer for system administration
temperature: 0.2
maxTokens: 8192

mcpServers:
  postgres:
    type: local
    command: ["/usr/bin/mcp-server-postgresql", "postgresql://nunix:nunix@localhost/ship_state"]
  filesystem:
    type: local
    command: ["/usr/bin/mcp-server-filesystem", "/home/nunix", "/etc", "/var/log"]
  systemd:
    type: local
    command: ["/usr/bin/mcp-server-systemd"]

customModels:
  qwen3.6:
    name: "Qwen 3.6"
    baseUrl: "http://127.0.0.1:11434/v1"
    family: "llama"
    limit:
      context: 32768
      output: 8192
    params:
      model: "qwen3.6:latest"
