model: "openai/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf"
provider-url: "http://127.0.0.1:8000/v1"
provider-api-key: "EMPTY"
max-steps: 30
debug: false
quiet: true
temperature: 0.1
maxTokens: 16384

mcpServers:
  postgres:
    type: local
    command: ["/usr/bin/mcp-server-postgresql", "postgresql://nunix:nunix@localhost/ship_state"]
  filesystem:
    type: local
    command: ["/usr/bin/mcp-server-filesystem", "/home/nunix", "/etc", "/var/log"]
  systemd:
    type: local
    command: ["/usr/bin/mcp-server-systemd"]
